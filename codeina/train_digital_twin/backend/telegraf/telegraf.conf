# Telegraf Configuration

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  logfile = ""

# Output to InfluxDB v2
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-super-secret-auth-token"
  organization = "train_org"
  bucket = "vibrations"

# Input from MQTT Broker
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "train/telemetry/vibrations"
  ]
  data_format = "json"
  # Extracción de campos JSON. "fft_spectrum" al ser array, dependerá de cómo se maneje.
  # Por defecto Telegraf aplanará los JSON de un nivel.
