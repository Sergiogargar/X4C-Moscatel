# Telegraf Configuration

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  logfile = ""

# Output to InfluxDB v2
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-super-secret-auth-token"
  organization = "train_org"
  bucket = "vibrations"

# Input from MQTT Broker
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "train/telemetry/vibrations"
  ]
  data_format = "json"

  # Client ID fijo: evita que sesiones huérfanas se acumulen en Mosquitto
  # y estabiliza la reconexión automática de Telegraf.
  client_id = "telegraf_train_monitor"

  # Tiempo máximo de inactividad antes de que Mosquitto cierre la sesión.
  # Debe ser mayor que el keepalive del ESP32 (120s) para no competir.
  keepalive = 60

  # Sin sesión persistente: al reconectar, recibe mensajes frescos inmediatamente.
  persistent_session = false

  # QoS 0: best-effort, sin confirmaciones. Coherente con el ESP32.
  qos = 0

  # trainId es un string: se almacena como tag en InfluxDB (no como campo numérico).
  # Sin esta línea, Telegraf descartaría el campo silenciosamente.
  tag_keys = ["trainId"]
