# Escuchar en todas las interfaces (necesario para que el ESP32 se conecte desde la red local)
listener 1883 0.0.0.0

# Permitir conexiones sin usuario/contraseña
# En producción, configurar autenticación con password_file
allow_anonymous true

# Persistencia de mensajes entre reinicios
persistence true
persistence_location /mosquitto/data/

# Log de errores y avisos
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
